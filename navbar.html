<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fleexify - Social Network</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #7c3aed;
      --primary-light: #a78bfa;
      --bg-dark: #0f0f0f;
      --bg-light: #ffffff;
      --card-dark: #1a1a1a;
      --card-light: #f5f5f5;
      --text-dark: #ffffff;
      --text-light: #0f0f0f;
      --text-secondary: #888888;
      --border-dark: #333333;
      --border-light: #e0e0e0;
      --shadow: 0 4px 20px rgba(124, 58, 237, 0.15);
      --shadow-hover: 0 8px 32px rgba(124, 58, 237, 0.25);
    }

    [data-theme="light"] {
      --bg: var(--bg-light);
      --card: var(--card-light);
      --text: var(--text-light);
      --text-secondary: #666666;
      --border: var(--border-light);
    }

    [data-theme="dark"] {
      --bg: var(--bg-dark);
      --card: var(--card-dark);
      --text: var(--text-dark);
      --border: var(--border-dark);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s ease, color 0.3s ease;
    }

    /* Main Navbar Container */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      z-index: 1000;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      backdrop-filter: blur(10px);
      animation: slideDown 0.4s ease;
    }

    @keyframes slideDown {
      from {
        transform: translateY(-100%);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .navbar-container {
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    /* Logo Section */
    .navbar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: fit-content;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .navbar-logo:hover {
      transform: scale(1.05);
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: white;
      font-size: 22px;
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.4);
    }

    .logo-text {
      font-weight: 800;
      font-size: 24px;
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    /* Search Bar */
    .search-container {
      flex: 1;
      max-width: 320px;
    }

    .search-box {
      width: 100%;
      padding: 10px 16px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 24px;
      font-size: 14px;
      color: var(--text);
      transition: all 0.3s ease;
      outline: none;
    }

    .search-box:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
      background: var(--bg);
    }

    .search-box::placeholder {
      color: var(--text-secondary);
    }

    /* Center Navigation Items */
    .navbar-menu {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      justify-content: center;
    }

    .nav-item {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      color: var(--text);
      font-size: 22px;
    }

    .nav-item:hover {
      background: var(--bg);
      color: var(--primary);
      transform: scale(1.1);
    }

    .nav-item.active {
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.15), rgba(167, 139, 250, 0.1));
      color: var(--primary);
    }

    .nav-item .badge {
      position: absolute;
      top: -6px;
      right: -6px;
      background: #ef4444;
      color: white;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(239, 68, 68, 0.4);
    }

    /* Right Side - Actions */
    .navbar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: fit-content;
    }

    .action-btn {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: none;
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.2s ease;
      position: relative;
    }

    .action-btn:hover {
      background: var(--border);
      color: var(--primary);
      transform: scale(1.08);
    }

    .action-btn .notification-dot {
      position: absolute;
      width: 8px;
      height: 8px;
      background: #ef4444;
      border-radius: 50%;
      top: 6px;
      right: 6px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }

    /* Profile Dropdown */
    .profile-container {
      position: relative;
    }

    .profile-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid var(--primary);
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      transition: all 0.2s ease;
      overflow: hidden;
    }

    .profile-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 4px 16px rgba(124, 58, 237, 0.5);
    }

    .profile-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Dropdown Menu */
    .dropdown {
      position: absolute;
      top: 60px;
      right: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow-hover);
      min-width: 240px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: all 0.3s ease;
      z-index: 2000;
      overflow: hidden;
    }

    .dropdown.active {
      opacity: 1;
      visibility: visible;
      transform: translateY(8px);
    }

    .dropdown-item {
      padding: 14px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text);
      transition: all 0.2s ease;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      font-weight: 500;
    }

    .dropdown-item:last-child {
      border-bottom: none;
    }

    .dropdown-item:hover {
      background: var(--bg);
      color: var(--primary);
      padding-left: 20px;
    }

    .dropdown-item.danger:hover {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
    }

    .dropdown-icon {
      font-size: 16px;
      min-width: 20px;
    }

    /* Theme Toggle */
    .theme-toggle {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: none;
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.2s ease;
    }

    .theme-toggle:hover {
      background: var(--border);
      color: var(--primary);
      transform: rotate(20deg);
    }

    /* Mobile Menu Button */
    .mobile-menu-btn {
      display: none;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: none;
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s ease;
    }

    .mobile-menu-btn:hover {
      background: var(--border);
    }

    .menu-line {
      width: 20px;
      height: 2px;
      background: var(--text);
      border-radius: 1px;
      transition: all 0.3s ease;
    }

    .mobile-menu-btn.active .menu-line:nth-child(1) {
      transform: rotate(45deg) translate(8px, 8px);
    }

    .mobile-menu-btn.active .menu-line:nth-child(2) {
      opacity: 0;
    }

    .mobile-menu-btn.active .menu-line:nth-child(3) {
      transform: rotate(-45deg) translate(7px, -7px);
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .search-container {
        max-width: 220px;
      }

      .navbar-menu .nav-item {
        width: 38px;
        height: 38px;
        font-size: 18px;
      }
    }

    @media (max-width: 768px) {
      .navbar {
        padding: 0 16px;
      }

      .search-container {
        display: none;
      }

      .navbar-menu {
        display: none;
        position: absolute;
        top: 70px;
        left: 0;
        right: 0;
        background: var(--card);
        flex-direction: column;
        gap: 0;
        border-bottom: 1px solid var(--border);
      }

      .navbar-menu.active {
        display: flex;
      }

      .navbar-menu .nav-item {
        width: 100%;
        border-radius: 0;
        height: 50px;
        justify-content: flex-start;
        padding-left: 20px;
      }

      .mobile-menu-btn {
        display: flex;
      }

      .logo-text {
        font-size: 20px;
      }

      .navbar-actions {
        gap: 8px;
      }
    }

    @media (max-width: 480px) {
      .navbar {
        height: 64px;
        padding: 0 12px;
      }

      .navbar-logo {
        gap: 8px;
      }

      .logo-icon {
        width: 36px;
        height: 36px;
        font-size: 18px;
      }

      .logo-text {
        font-size: 18px;
      }

      .navbar-actions {
        gap: 4px;
      }

      .action-btn {
        width: 36px;
        height: 36px;
        font-size: 16px;
      }

      .profile-btn {
        width: 36px;
        height: 36px;
      }
    }

    /* Main Content Area */
    main {
      margin-top: 70px;
      padding: 24px;
    }

    .hero {
      max-width: 1400px;
      margin: 0 auto;
      text-align: center;
      padding: 60px 20px;
    }

    .hero h1 {
      font-size: 48px;
      font-weight: 800;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      font-size: 18px;
      color: var(--text-secondary);
      margin-bottom: 40px;
    }

    .cta-buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .cta-btn {
      padding: 14px 32px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .cta-btn.primary {
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      color: white;
      box-shadow: 0 4px 16px rgba(124, 58, 237, 0.4);
    }

    .cta-btn.primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(124, 58, 237, 0.6);
    }

    .cta-btn.secondary {
      background: var(--bg);
      border: 2px solid var(--border);
      color: var(--text);
    }

    .cta-btn.secondary:hover {
      border-color: var(--primary);
      color: var(--primary);
    }
  </style>
</head>
<body data-theme="dark">
  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="navbar-container">
      <!-- Logo -->
      <div class="navbar-logo">
        <div class="logo-icon">F</div>
        <div class="logo-text">Fleexify</div>
      </div>

      <!-- Search Bar -->
      <div class="search-container">
        <input type="text" class="search-box" placeholder="🔍 Search Fleexify...">
      </div>

      <!-- Center Navigation -->
      <div class="navbar-menu">
        <div class="nav-item active" title="Home">
          <span>🏠</span>
        </div>
        <div class="nav-item" title="Friends">
          <span>👥</span>
        </div>
        <div class="nav-item" title="Messages">
          <span>💬</span>
          <div class="badge">3</div>
        </div>
        <div class="nav-item" title="Notifications">
          <span>🔔</span>
          <div class="badge">12</div>
        </div>
        <div class="nav-item" title="Videos">
          <span>🎬</span>
        </div>
      </div>

      <!-- Mobile Menu Button -->
      <button class="mobile-menu-btn" id="mobileMenuBtn">
        <span class="menu-line"></span>
        <span class="menu-line"></span>
        <span class="menu-line"></span>
      </button>

      <!-- Right Actions -->
      <div class="navbar-actions">
        <!-- Theme Toggle -->
        <button class="theme-toggle" id="themeBtn" title="Toggle theme">
          <span id="themeIcon">🌙</span>
        </button>

        <!-- Notifications -->
        <button class="action-btn" title="Notifications">
          <span>🔔</span>
          <div class="notification-dot"></div>
        </button>

        <!-- Profile -->
        <div class="profile-container">
          <button class="profile-btn" id="profileBtn" title="Profile">
            👤
          </button>
          <div class="dropdown" id="profileDropdown">
            <div class="dropdown-item">
              <span class="dropdown-icon">👤</span>
              <span>My Profile</span>
            </div>
            <div class="dropdown-item">
              <span class="dropdown-icon">⚙️</span>
              <span>Settings</span>
            </div>
            <div class="dropdown-item">
              <span class="dropdown-icon">📋</span>
              <span>Saved</span>
            </div>
            <div class="dropdown-item">
              <span class="dropdown-icon">🎨</span>
              <span>Appearance</span>
            </div>
            <div class="dropdown-item">
              <span class="dropdown-icon">❓</span>
              <span>Help & Support</span>
            </div>
            <div class="dropdown-item danger">
              <span class="dropdown-icon">🚪</span>
              <span>Logout</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main>
    <div class="hero">
      <h1>Welcome to Fleexify 🚀</h1>
      <p>The most modern social network platform</p>
      <div class="cta-buttons">
        <button class="cta-btn primary">Start Exploring</button>
        <button class="cta-btn secondary">Learn More</button>
      </div>
    </div>
  </main>

  <script>
    // Theme Toggle
    const themeBtn = document.getElementById('themeBtn');
    const htmlElement = document.documentElement;
    const themeIcon = document.getElementById('themeIcon');

    let currentTheme = localStorage.getItem('theme') || 'dark';
    htmlElement.setAttribute('data-theme', currentTheme);
    updateThemeIcon();

    themeBtn.addEventListener('click', () => {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      htmlElement.setAttribute('data-theme', currentTheme);
      localStorage.setItem('theme', currentTheme);
      updateThemeIcon();
    });

    function updateThemeIcon() {
      themeIcon.textContent = currentTheme === 'dark' ? '☀️' : '🌙';
    }

    // Profile Dropdown Toggle
    const profileBtn = document.getElementById('profileBtn');
    const profileDropdown = document.getElementById('profileDropdown');

    profileBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      profileDropdown.classList.toggle('active');
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.profile-container')) {
        profileDropdown.classList.remove('active');
      }
    });

    // Mobile Menu Toggle
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const navbarMenu = document.querySelector('.navbar-menu');

    mobileMenuBtn.addEventListener('click', () => {
      mobileMenuBtn.classList.toggle('active');
      navbarMenu.classList.toggle('active');
    });

    // Close mobile menu when clicking a nav item
    document.querySelectorAll('.navbar-menu .nav-item').forEach(item => {
      item.addEventListener('click', () => {
        mobileMenuBtn.classList.remove('active');
        navbarMenu.classList.remove('active');
      });
    });

    // Active nav item on click
    document.querySelectorAll('.navbar-menu .nav-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.navbar-menu .nav-item').forEach(el => {
          el.classList.remove('active');
        });
        item.classList.add('active');
      });
    });

    // Search functionality demo
    const searchBox = document.querySelector('.search-box');
    searchBox.addEventListener('focus', () => {
      searchBox.placeholder = '🔍 Search people, posts, topics...';
    });

    searchBox.addEventListener('blur', () => {
      searchBox.placeholder = '🔍 Search Fleexify...';
    });

    // Dropdown item interactions
    document.querySelectorAll('.dropdown-item').forEach(item => {
      item.addEventListener('click', () => {
        console.log('Clicked:', item.textContent.trim());
        profileDropdown.classList.remove('active');
      });
    });
  </script>
</body>
</html>
